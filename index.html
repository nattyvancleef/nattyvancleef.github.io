<!DOCTYPE html>
<html>
<head>
  <title>nattyvancleef</title>
  <meta charset="UTF-8" />

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Helvetica+Neue:wght@300&display=swap');

    body {
      margin: 0;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      background: #f7f6f4;
      color: #1a1a1a;
      overflow-x: hidden;
    }

    /* NAV (same everywhere now) */
    nav {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 10;
    }

    nav ul {
      display: flex;
      gap: 30px;
      list-style: none;
      margin: 0;
      padding: 0;
    }

    nav a {
      color: #fff;
      text-decoration: none;
      font-size: 24px;
      font-weight: 300;
      transition: filter 0.3s;
    }

    nav a:hover {
      filter: blur(1px);
    }

    /* NVC (same system, but subtle on homepage) */
    .return-arrow {
      position: fixed;
      top: 20px;
      left: 20px;
      color: #fff;
      text-decoration: none;
      font-size: 14px;
      letter-spacing: 2px;
      z-index: 10;
      opacity: 0.6; /* subtle since it's already home */
    }

    /* HERO VIDEO BACKGROUND */
    .hero-background {
      position: fixed;
      inset: 0;
      z-index: -2;
    }

    .hero-background video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* subtle overlay (same as videos page) */
    .hero-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.25);
      z-index: -1;
    }

    /* HERO CONTENT */
    .hero {
      position: relative;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 0 20px;
      z-index: 1;
    }

    h1 {
      font-size: 4em;
      max-width: 900px;
      font-weight: 300;
      line-height: 1.2;
      color: #fff;
      margin: 0;
      letter-spacing: 1px;
    }

    @media (max-width:600px){
      nav a { font-size:18px; }
      h1 { font-size: 2.5em; }
    }

  </style>
</head>

<body>

<a href="index.html" class="return-arrow">NVC</a>

<nav>
  <ul>
    <li><a href="photos.html">Photos</a></li>
    <li><a href="videos.html">Videos</a></li>
    <li><a href="music.html">Music</a></li>
    <li><a href="contact.html">Contact</a></li>
  </ul>
</nav>

<!-- Background Video -->
<div class="hero-background">
  <video autoplay muted loop playsinline>
    <source src="ambshighschoolinvert.2.mp4" type="video/mp4" />
  </video>
</div>

<!-- Overlay -->
<div class="hero-overlay"></div>

<!-- Hero -->
<section class="hero">
  <h1>nattyvancleef</h1>
</section>

</body>
</html>
