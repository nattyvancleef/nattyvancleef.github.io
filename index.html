<!DOCTYPE html>
<html>
<head>
  <title>My Site</title>
  <meta charset="UTF-8">

  <style>
    body {
      margin: 0;
      font-family: "Helvetica Neue", Arial, sans-serif;
      background: #f7f6f4;
      color: #1a1a1a;
    }

    header {
      display: flex;
      justify-content: space-between;
      padding: 25px 50px;
      font-size: 14px;
      letter-spacing: 1px;
    }

    .hero {
      height: 85vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 20px;
      text-align: center;
    }

    .hero h1 {
      font-size: 3.2em;
      max-width: 700px;
      font-weight: 500;
      line-height: 1.3;
    }

    .section {
      padding: 100px 20px;
      max-width: 900px;
      margin: auto;
      text-align: center;
    }

    .section h2 {
      font-size: 1.8em;
      margin-bottom: 20px;
    }

    .section p {
      color: #555;
      line-height: 1.6;
    }

    .image {
      margin: 60px auto;
      max-width: 1000px;
    }

    .image img {
      width: 100%;
      border-radius: 12px;
    }

    footer {
      padding: 60px 20px;
      text-align: center;
      font-size: 14px;
      color: #777;
    }
  </style>
</head>

<body>

<header>
  <div>NATTYVANCLEEF</div>
  <div>PHOTOS • VIDEOS • CONTACT</div>
</header>

<section class="hero">
  <h1>
    A showcase to knock the pillars out.
  </h1>
</section>

<div class="image">
  <img src="https://images.unsplash.com/photo-1492724441997-5dc865305da7">
</div>

<section class="section">
  <h2>About</h2>
  <p>
    Someone told me that grandma loves you. That's about as good as it gets.
  </p>
</section>

<section class="section">
  <h2>Selected Work</h2>
  <p>Projects coming soon.</p>
</section>

<footer>
  © 2026 Your Name
</footer>

</body>
</html>
