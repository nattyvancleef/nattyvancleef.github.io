<!DOCTYPE html>
<html>
<head>
  <title>Contact - nattyvancleef</title>
  <meta charset="UTF-8" />
  <style>
    body {
      margin: 0;
      font-family: "Helvetica Neue", Arial, sans-serif;
      background: #f7f6f4;
      color: #1a1a1a;
    }

    /* Return arrow styled as a keyhole with blur effect, now displaying "NVC" */
    .return-arrow {
      position: fixed;
      top: 20px;
      left: 20px;
      font-size: 24px;
      color: #fff;
      text-decoration: none;
      padding: 10px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(4px);
      transition: filter 0.3s, background 0.3s;
      z-index: 10;
    }

    /* Show "NVC" text on arrow button, thinner and stretched */
    .return-arrow::after {
      content: "NVC";
      font-weight: 300; /* Thinner font weight */
      display: inline-block;
      width: 80px; /* Increased width for stretch */
      text-align: center;
    }

    .return-arrow:hover {
      filter: blur(1px);
      background: rgba(255, 255, 255, 0.3);
    }

    /* Toggle button for hero video overlay */
    .toggle-hero {
      position: fixed;
      top: 20px;
      right: 20px;
      font-size: 36px;
      cursor: pointer;
      z-index: 1000;
      color: #fff;
      background: rgba(0, 0, 0, 0.4);
      padding: 15px;
      border-radius: 50%;
      transition: background 0.3s;
    }

    .toggle-hero:hover {
      background: rgba(0, 0, 0, 0.6);
    }

    section {
      padding: 50px 20px;
      max-width: 600px;
      margin: auto;
      text-align: center;
    }

    h2 {
      font-size: 2em;
      margin-bottom: 20px;
    }

    p {
      font-size: 1.2em;
      margin: 10px 0;
    }

    /* Style for the hero video overlay container */
    #hero-video {
      display: none; /* Hidden by default */
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 999; /* Behind the toggle button */
    }

    #hero-video video {
      width: 100%; height: 100%; object-fit: cover;
    }
  </style>
</head>
<body>

<!-- Hero Video Overlay (hidden by default) -->
<div id="hero-video">
  <video src="your-hero-video.mp4" autoplay muted loop playsinline></video>
</div>

<!-- Return arrow with "NVC" text -->
<a href="index.html" class="return-arrow" aria-label="Return to homepage"></a>

<!-- Toggle button for hero video overlay -->
<div class="toggle-hero" onclick="toggleHeroVideo()" aria-label="Toggle Hero Video" title="Toggle Hero Video">
  &#9658; <!-- Play symbol or change to a different icon if desired -->
</div>

<section id="contact">
  <h2>Contact</h2>
  <p>Email: charliesangster@icloud.com</p>
  <p>Instagram: <a href="https://instagram.com/charliesngster" target="_blank">@charliesngster</a></p>
</section>

<script>
  function toggleHeroVideo() {
    const heroVideo = document.getElementById('hero-video');
    if (heroVideo) {
      heroVideo.style.display = (heroVideo.style.display === 'block') ? 'none' : 'block';
    }
  }
</script>

</body>
</html>
