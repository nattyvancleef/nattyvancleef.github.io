<!DOCTYPE html>
<html>
<head>
  <title>Videos - nattyvancleef</title>
  <meta charset="UTF-8" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Helvetica+Neue:wght@300&display=swap');

    body {
      margin: 0;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      background: #f7f6f4;
      color: #1a1a1a;
    }

    /* Navigation menu styles (top right) */
    nav {
      position: fixed;
      top: 20px;
      right: 20px;
      display: flex;
      align-items: center;
      z-index: 10;
    }

    nav ul {
      list-style: none;
      display: flex;
      gap: 30px;
      margin: 0;
      padding: 0;
    }

    nav ul li {
      display: inline;
    }

    /* Menu links styling */
    nav ul li a {
      text-decoration: none;
      color: #fff;
      font-size: 24px; /* bigger and sleeker */
      font-weight: 300; /* thinner font weight */
      padding: 8px 12px;
      border-radius: 4px;
      transition: filter 0.3s, mix-blend-mode 0.3s;
      font-family: 'Helvetica Neue', Arial, sans-serif;
    }

    /* Hover effect: blur and blending with hero video */
    nav ul li a:hover {
      filter: blur(1px);
      mix-blend-mode: overlay;
    }

    /* "NVC" in top left */
    .nvc-label {
      position: fixed;
      top: 20px;
      left: 20px;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      font-size: 28px;
      font-weight: 300;
      color: #fff;
      z-index: 10;
      letter-spacing: 2px;
      background: transparent; /* just the text */
    }

    /* Hero video background full page */
    .hero-background {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100vh;
      overflow: hidden;
      z-index: -1; /* behind other content */
    }

    .hero-background video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Section styling for content */
    section {
      padding: 50px 20px;
      max-width: 1200px;
      margin: auto;
      text-align: center;
    }

    h2 {
      font-size: 2em;
      margin-bottom: 20px;
    }

    p {
      color: #666;
      line-height: 1.6;
    }

    .video-container {
      margin-top: 40px;
    }

    video {
      width: 100%;
      max-width: 800px;
    }

    /* Style for the hero video overlay container (if needed) */
    #hero-video {
      display: none; /* Hidden by default, kept for compatibility */
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 999;
    }

    #hero-video video {
      width: 100%; height: 100%; object-fit: cover;
    }
  </style>
</head>
<body>

<!-- Navigation Menu at Top Right -->
<nav>
  <ul>
    <li><a href="photos.html">Photos</a></li>
    <li><a href="videos.html">Videos</a></li>
    <li><a href="music.html">Music</a></li>
    <li><a href="contact.html">Contact</a></li>
  </ul>
</nav>

<!-- "NVC" in Top Left -->
<div class="nvc-label">NVC</div>

<!-- Background Hero Video -->
<div class="hero-background">
  <video autoplay muted loop playsinline>
    <source src="waterbabiesnvc.mp4" type="video/mp4" />
  </video>
</div>

<!-- Your content section -->
<section id="videos">
  <h2>Videos</h2>
  <p>Selected video work.</p>
  <div class="video-container">
    <video autoplay muted loop playsinline>
      <source src="waterbabiesnvc.mp4" type="video/mp4" />
    </video>
  </div>
</section>

<!-- Optional: script if needed -->
<script>
  // No toggle needed since overlay is hidden
</script>

</body>
</html>
