<script>
const videos = [
  "daily commute.mp4",
  "fishdicks.mp4",
  "dogdogbigone_2.mp4",
  "nvc.mp4",
  "bts.mp4",
  "You've been Framed.mp4",
  "Startedstealing.mp4"
];

const YT_LINK = "https://youtube.com/c/nattyvancleef";

videos.forEach((src) => {
  const win = document.createElement("div");
  win.className = "window";

  // keep inside screen bounds properly
  win.style.top = Math.random() * (window.innerHeight - 180) + "px";
  win.style.left = Math.random() * (window.innerWidth - 280) + "px";

  win.innerHTML = `
    <div class="video-box">
      <video muted autoplay loop playsinline>
        <source src="${src}" type="video/mp4">
      </video>
    </div>
  `;

  // click = go to youtube
  win.addEventListener("click", () => {
    window.open(YT_LINK, "_blank");
  });

  document.body.appendChild(win);
});
</script>
