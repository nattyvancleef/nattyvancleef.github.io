<!DOCTYPE html>
<html>
<head>
  <title>Videos - nattyvancleef</title>
  <meta charset="UTF-8" />

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Helvetica+Neue:wght@300&display=swap');

    body {
      margin: 0;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      background: #000;
      overflow: hidden;
    }

    /* NAV */
    nav {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 10;
    }

    nav ul {
      display: flex;
      gap: 30px;
      list-style: none;
      margin: 0;
      padding: 0;
    }

    nav a {
      color: #fff;
      text-decoration: none;
      font-size: 24px;
      font-weight: 300;
      transition: filter 0.3s;
    }

    nav a:hover {
      filter: blur(1px);
    }

    /* NVC */
    .return-arrow {
      position: fixed;
      top: 20px;
      left: 20px;
      color: #fff;
      text-decoration: none;
      font-size: 14px;
      letter-spacing: 2px;
      z-index: 10;
    }

    /* BACKGROUND VIDEO */
    .hero-background {
      position: fixed;
      inset: 0;
      z-index: -2;
    }

    .hero-background video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .hero-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.25);
      z-index: -1;
    }

    /* FLOATING WINDOWS */
    .window {
      position: absolute;
      width: 260px;
      background: #000;
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      cursor: pointer;
      z-index: 5;
      transition: transform 0.2s ease;
    }

    .window:hover {
      transform: scale(1.03);
    }

    .video-box video {
      width: 100%;
      display: block;
    }

  </style>
</head>

<body>

<a href="index.html" class="return-arrow">NVC</a>

<nav>
  <ul>
    <li><a href="photos.html">Photos</a></li>
    <li><a href="videos.html">Videos</a></li>
    <li><a href="music.html">Music</a></li>
    <li><a href="contact.html">Contact</a></li>
  </ul>
</nav>

<div class="hero-background">
  <video autoplay muted loop playsinline>
    <source src="waterbabiesnvc.mp4" type="video/mp4">
  </video>
</div>

<div class="hero-overlay"></div>

<script>
const videos = [
  "daily commute.mp4",
  "fishdicks.mp4",
  "dogdogbigone_2.mp4",
  "nvc.mp4",
  "bts.mp4",
  "Youve been Framed.mp4",
  "Startedstealing.mp4"
];

const YT_LINK = "https://youtube.com/c/nattyvancleef";

videos.forEach((src) => {
  const win = document.createElement("div");
  win.className = "window";

  // keep windows inside viewport
  const maxTop = window.innerHeight - 180;
  const maxLeft = window.innerWidth - 260;

  win.style.top = Math.random() * maxTop + "px";
  win.style.left = Math.random() * maxLeft + "px";

  win.innerHTML = `
    <div class="video-box">
      <video muted autoplay loop playsinline>
        <source src="${src}" type="video/mp4">
      </video>
    </div>
  `;

  win.addEventListener("click", () => {
    window.open(YT_LINK, "_blank");
  });

  document.body.appendChild(win);
});
</script>

</body>
</html>
