<!DOCTYPE html>
<html>
<head>
  <title>Videos - nattyvancleef</title>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Helvetica+Neue:wght@300&display=swap');

    body {
      margin: 0;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      background: #000;
      overflow-x: hidden;
    }

    /* NAV */
    nav {
      position: fixed;
      top: clamp(15px, 3vw, 20px);
      right: clamp(15px, 3vw, 20px);
      z-index: 10;
    }

    nav ul {
      display: flex;
      gap: clamp(12px, 3vw, 30px);
      list-style: none;
      margin: 0;
      padding: 0;
    }

    nav a {
      color: #fff;
      text-decoration: none;
      font-size: clamp(18px, 5vw, 48px);
      font-weight: 300;
      transition: filter 0.3s;
    }

    nav a:hover {
      filter: blur(1px);
    }

    /* NVC */
    .return-arrow {
      position: fixed;
      top: clamp(15px, 3vw, 20px);
      left: clamp(15px, 3vw, 20px);
      color: #fff;
      text-decoration: none;
      font-size: clamp(14px, 4vw, 32px);
      letter-spacing: 2px;
      z-index: 10;
      opacity: 0.6;
    }

    /* BACKGROUND */
    .hero-background {
      position: fixed;
      inset: 0;
      z-index: -2;
    }

    .hero-background video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .hero-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.25);
      z-index: -1;
    }

    /* CONTENT */
    .content {
      position: relative;
      height: 200vh;
    }

    /* WINDOWS */
    .window {
      position: absolute;
      width: clamp(160px, 38vw, 260px);
      background: #000;
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      cursor: pointer;
      z-index: 5;
      transition: transform 0.4s ease, left 0.4s ease, top 0.4s ease;
    }

    .window:hover {
      transform: scale(1.03);
    }

    .window.focused {
      z-index: 20;
      transform: scale(1.4);
    }

    .video-box video {
      width: 100%;
      display: block;
    }

  </style>
</head>

<body>

<a href="index.html" class="return-arrow">NVC</a>

<nav>
  <ul>
    <li><a href="photos.html">Photos</a></li>
    <li><a href="videos.html">Videos</a></li>
    <li><a href="music.html">Music</a></li>
    <li><a href="contact.html">Contact</a></li>
  </ul>
</nav>

<div class="hero-background">
  <video autoplay muted loop playsinline>
    <source src="waterbabiesnvc.mp4" type="video/mp4">
  </video>
</div>

<div class="hero-overlay"></div>

<div class="content" id="content"></div>

<script>
const videos = [
  "daily commute.mp4",
  "fishdicks.mp4",
  "bts.mp4",
  "Youve-been-Framed.mp4",
  "Startedstealing.mp4",
  "metal test copy.mp4",
  "Maceos copy.mp4",
  "dogdogbigone_1.mp4",
  "vid_4osc333.mp4",
  "mercades.mp4",
  "Olympus.mp4",
  "golf54.mp4",
  "A&E.mp4",
  "karatemountainboy.mp4"
];

const content = document.getElementById("content");
const placed = [];
const windows = [];

const winW = () => Math.min(Math.max(window.innerWidth * 0.38, 160), 260);
const winH = () => winW() * 0.7;

function isOverlapping(x, y) {
  return placed.some(p => {
    return !(
      x + winW() < p.x ||
      x > p.x + winW() ||
      y + winH() < p.y ||
      y > p.y + winH()
    );
  });
}

videos.forEach((src, i) => {
  const win = document.createElement("div");
  win.className = "window";

  const cols = Math.max(1, Math.floor(window.innerWidth / (winW() + 20)));
  const col = i % cols;
  const row = Math.floor(i / cols);

  const x = col * (winW() + 20) + 20;
  const y = row * (winH() + 40) + 100;

  win.dataset.x = x;
  win.dataset.y = y;

  win.style.left = x + "px";
  win.style.top = y + "px";

  win.innerHTML = `
    <div class="video-box">
      <video muted autoplay loop playsinline>
        <source src="${src}" type="video/mp4">
      </video>
    </div>
  `;

  win.addEventListener("click", (e) => {
    e.stopPropagation();
    focusWindow(win);
  });

  windows.push(win);
  content.appendChild(win);
});

function focusWindow(target) {
  const centerX = window.innerWidth / 2 - winW() / 2;
  const centerY = window.innerHeight / 2 - winH() / 2;

  windows.forEach(win => {
    const video = win.querySelector("video");
    win.classList.remove("focused");

    let x = parseFloat(win.dataset.x);
    let y = parseFloat(win.dataset.y);

    if (win === target) {
      win.style.left = centerX + "px";
      win.style.top = centerY + "px";
      win.classList.add("focused");

      video.muted = false;
      video.play();

    } else {
      video.muted = true;

      const dx = x - target.dataset.x;
      const dy = y - target.dataset.y;
      const dist = Math.sqrt(dx*dx + dy*dy);

      if (dist < 300) {
        const push = 60;
        const angle = Math.atan2(dy, dx);
        x += Math.cos(angle) * push;
        y += Math.sin(angle) * push;
      }

      win.style.left = x + "px";
      win.style.top = y + "px";
    }
  });
}
</script>

</body>
</html>
