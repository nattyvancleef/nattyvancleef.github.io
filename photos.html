<!DOCTYPE html>
<html>
<head>
  <title>Photos - nattyvancleef</title>
  <meta charset="UTF-8" />
  <style>
    body {
      margin: 0;
      font-family: "Helvetica Neue", Arial, sans-serif;
      background: #f7f6f4;
      color: #1a1a1a;
      position: relative;
    }

    /* Return arrow with "NVC" text, pointing outward left */
    .return-arrow {
      position: fixed;
      top: 20px;
      left: 20px;
      font-size: 30px;
      color: #fff;
      text-decoration: none;
      padding: 10px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(4px);
      z-index: 10;
    }

    /* Display "NVC" text instead of arrow, thinner font, stretched width */
    .return-arrow::after {
      content: "NVC";
      font-weight: 300; /* Thinner font weight */
      display: inline-block;
      width: 80px; /* Increased width for stretch */
      text-align: center;
    }

    .return-arrow:hover {
      filter: blur(1px);
      background: rgba(255, 255, 255, 0.3);
    }

    section {
      padding: 50px 20px;
      max-width: 1200px;
      margin: auto;
      text-align: center;
      position: relative; /* For absolute children to be relative to this container */
    }

    h2 {
      font-size: 2em;
      margin-bottom: 20px;
    }

    p {
      color: #666;
      line-height: 1.6;
    }

    /* Container for images with relative position for absolute children */
    .photo-container {
      position: relative;
      height: 80vh; /* To limit vertical spread, or use auto for full height */
    }

    /* Photos with absolute positioning for random spread */
    .photo {
      position: absolute;
      cursor: pointer;
      max-width: 200px;
      max-height: 200px;
    }

    /* Lightbox for enlarged images */
    #lightbox {
      display: none; /* Hidden by default */
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.8);
      justify-content: center;
      align-items: center;
      z-index: 2000;
    }

    #lightbox img {
      max-width: 90%;
      max-height: 90%;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
      cursor: pointer;
    }
  </style>
</head>
<body>

<!-- Lightbox for enlarged photo -->
<div id="lightbox" onclick="closeLightbox()">
  <img src="" alt="Enlarged Photo" />
</div>

<!-- Return arrow with "NVC" text -->
<a href="index.html" class="return-arrow" aria-label="Return to homepage"></a>

<section id="photos">
  <h2>Photos</h2>
  <p>Selected photography work.</p>
  <div class="photo-container" id="photo-container">
    <!-- Photos will be dynamically added here -->
  </div>
</section>

<script>
  const imageSources = [
    "DSCF7323.JPEG", "DSCF7358.JPEG", "DSCF7478.JPEG", "DSCF7770.JPEG",
    "DSCF7772.JPEG", "DSCF7896.JPEG", "DSCF7960.JPEG", "DSCF8338.JPEG",
    "DSCF8395.jpg", "DSCF8746.JPEG", "DSCF8777.JPEG", "DSCF8792.JPEG",
    "DSCF8815.JPEG", "DSCF8852.JPEG", "DSCF9364.JPEG", "DSCF9494.JPEG",
    "IMG_0234.JPG", "IMG_0240.JPEG", "IMG_0747.JPEG", "IMG_1374.JPEG",
    "IMG_1569.JPEG", "IMG_1696.jpg", "IMG_1966.jpg", "IMG_2026.JPEG",
    "IMG_2078.jpg", "IMG_2277 2.jpg", "IMG_2277.jpg", "IMG_2536.JPEG",
    "IMG_2621.JPEG", "IMG_2675.JPG", "IMG_2724.JPG", "IMG_4057.jpg",
    "IMG_4222.JPG", "IMG_6539.jpg", "Jungle'Cleet06.JPG", "P1000007.JPG",
    "P1000086.JPG", "P1000098.JPG", "P1000170.JPG", "P1000195.JPG",
    "P1010086.JPG", "110_0603.JPG", "B35B75C4-4BA4-434F-A6BB-1DCBAD0984D0.JPG",
    "Chelsea Flower Show'04 009.JPG", "DSCF2287.JPEG", "DSCF5912.JPEG",
    "DSCF6353.jpg", "DSCF6786.JPEG", "DSCF6866.JPEG", "DSCF6977.JPEG",
    "DSCF7290.JPEG", "P1010411.JPG", "P1010519.JPG", "P1010526.JPG",
    "P1010530.JPEG", "P1010546.JPEG", "P7260885.JPEG"
  ];

  const container = document.getElementById('photo-container');

  // Function to generate random positions within container
  function getRandomPosition(maxWidth, maxHeight, imgWidth, imgHeight) {
    const x = Math.random() * (maxWidth - imgWidth);
    const y = Math.random() * (maxHeight - imgHeight);
    return { x, y };
  }

  // To avoid overlap, we'll keep track of occupied areas (simplified approach)
  const occupiedAreas = [];

  function isOverlapping(x, y, width, height) {
    for (const area of occupiedAreas) {
      if (
        x < area.x + area.width &&
        x + width > area.x &&
        y < area.y + area.height &&
        y + height > area.y
      ) {
        return true; // Overlap detected
      }
    }
    return false;
  }

  // Add images with random positions
  imageSources.forEach(src => {
    const img = document.createElement('img');
    img.src = src;
    img.className = 'photo';

    // Append first to get natural width/height
    container.appendChild(img);

    // Wait until image loads to get size
    img.onload = () => {
      const maxWidth = container.clientWidth;
      const maxHeight = container.clientHeight;
      const width = img.width;
      const height = img.height;
      let position;
      let attempts = 0;
      do {
        position = getRandomPosition(maxWidth, maxHeight, width, height);
        attempts++;
      } while (isOverlapping(position.x, position.y, width, height) && attempts < 100);

      // Save the position
      occupiedAreas.push({ x: position.x, y: position.y, width, height });

      // Apply position styling
      img.style.left = position.x + 'px';
      img.style.top = position.y + 'px';
    };

    // Add click event for lightbox
    img.addEventListener('click', () => {
      const lightbox = document.getElementById('lightbox');
      const lightboxImg = lightbox.querySelector('img');
      lightboxImg.src = img.src;
      lightbox.style.display = 'flex';
    });
  });

  function closeLightbox() {
    document.getElementById('lightbox').style.display = 'none';
  }
</script>
</body>
</html>
