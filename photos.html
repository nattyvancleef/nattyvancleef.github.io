<style>
@import url('https://fonts.googleapis.com/css2?family=Helvetica+Neue:wght@300&display=swap');

body {
  margin:0;
  font-family:"Helvetica Neue", Arial, sans-serif;
  background:#f7f6f4;
  overflow-x: hidden;
}

/* NAV (desktop unchanged) */
nav {
  position: fixed;
  top:20px;
  right:20px;
  z-index: 10;
}
nav ul {
  display:flex;
  gap:30px;
  list-style:none;
  margin:0;
  padding:0;
}
nav a {
  text-decoration:none;
  color:#000;
  font-size:24px;
  font-weight: 300;
  transition: filter 0.3s;
}
nav a:hover { filter: blur(1px); }

/* NVC (desktop unchanged) */
.nvc {
  position:fixed;
  top:20px;
  left:20px;
  text-decoration:none;
  color:#000;
  font-size:14px;
  letter-spacing:2px;
  z-index:10;
}

/* GRID */
.gallery {
  padding:120px 40px;
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(200px,1fr));
  gap:20px;
}

.gallery img,
.card img {
  width:100%;
  cursor:pointer;
  transition:0.3s;
}

.gallery img:hover,
.card img:hover {
  transform:scale(1.02);
}

.card { width:100%; }

/* VIEWER */
#viewer {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.9);
  display:none;
  align-items:center;
  justify-content:center;
}
#viewer img {
  max-width:90%;
  max-height:90%;
}

/* ========================= */
/* MOBILE — EXACT MATCH INDEX */
/* ========================= */

@media (max-width:600px){

  body {
    background:#000;
  }

  nav {
    top:20px;
    right:20px;
  }

  nav ul {
    gap:24px;
  }

  nav a {
    font-size:48px; /* MATCH INDEX */
    color:#fff;
  }

  .nvc {
    top:20px;
    left:20px;
    font-size:32px; /* MATCH INDEX */
    color:#fff;
    opacity:0.6;
    letter-spacing:3px;
  }

  .gallery {
    padding:100px 15px;
    gap:12px;
    grid-template-columns: repeat(auto-fit, minmax(140px,1fr));
  }

}
</style>
