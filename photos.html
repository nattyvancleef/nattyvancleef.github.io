<!DOCTYPE html>

  <style>
    body {
      margin: 0;
      font-family: "Helvetica Neue", Arial, sans-serif;
      background: #f7f6f4;
      color: #1a1a1a;
    }

    /* Return arrow with "NVC" text, pointing outward left */
    .return-arrow {
      position: fixed;
      top: 20px;
      left: 20px;
      font-size: 30px;
      color: #fff;
      text-decoration: none;
      padding: 10px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(4px);
      z-index: 10;
    }

    /* Display "NVC" text instead of arrow, thinner font, stretched width */
    .return-arrow::after {
      content: "NVC";
      font-weight: 300; /* Thinner font weight */
      display: inline-block;
      width: 80px; /* Increased width for stretch */
      text-align: center;
    }

    .return-arrow:hover {
      filter: blur(1px);
      background: rgba(255, 255, 255, 0.3);
    }

    section {
      padding: 50px 20px;
      max-width: 1200px;
      margin: auto;
      text-align: center;
    }

    h2 {
      font-size: 2em;
      margin-bottom: 20px;
    }

    p {
      color: #666;
      line-height: 1.6;
    }

    /* Grid layout for photos */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-top: 40px;
    }

    /* Photo card without borders or overlay */
    .card {
      border-radius: 10px;
      overflow: hidden;
      cursor: pointer; /* Indicate clickable images */
      background: transparent;
    }

    .card img {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 10px; /* Keep rounded corners */
    }

    /* Lightbox for enlarged images */
    #lightbox {
      display: none; /* Hidden by default */
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.8);
      justify-content: center;
      align-items: center;
      z-index: 2000;
    }

    #lightbox img {
      max-width: 90%;
      max-height: 90%;
      border-radius: 10px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
      cursor: pointer;
      /* Removed hover zoom effect for less animation on click */
    }
  </style>
</head>

<script>
  // Lightbox functionality
  document.querySelectorAll('.card img').forEach(img => {
    img.addEventListener('click', () => {
      const lightbox = document.getElementById('lightbox');
      const lightboxImg = lightbox.querySelector('img');
      lightboxImg.src = img.src;
      lightbox.style.display = 'flex';
    });
  });

  function closeLightbox() {
    document.getElementById('lightbox').style.display = 'none';
  }
</script>
