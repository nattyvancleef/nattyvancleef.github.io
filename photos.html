<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Photo Museum</title>

<style>

body {
  margin:0;
  font-family: "Helvetica Neue", Arial, sans-serif;
  background:#f7f6f4;
  overflow:hidden;
}

/* SCENE */
#scene {
  width:100vw;
  height:100vh;
  perspective:1400px;
  overflow:hidden;
}

/* ROOM */
.room {
  position:absolute;
  width:2000px;
  height:1200px;
  left:50%;
  top:50%;
  transform-style:preserve-3d;
  transform:translate(-50%,-50%);
  transition:opacity 0.6s ease;
}

/* WALLS */
.wall {
  position:absolute;
  width:2000px;
  height:1200px;
  background:#ffffff;
  box-shadow:inset 0 0 80px rgba(0,0,0,0.08);
}

.front { transform: translateZ(1000px); }
.back { transform: rotateY(180deg) translateZ(1000px); }
.left { transform: rotateY(-90deg) translateZ(1000px); }
.right { transform: rotateY(90deg) translateZ(1000px); }

/* FLOOR (wood-ish) */
.floor {
  position:absolute;
  width:2000px;
  height:2000px;
  background: repeating-linear-gradient(
    90deg,
    #d6d2cc,
    #d6d2cc 40px,
    #cfcac3 40px,
    #cfcac3 80px
  );
  transform: rotateX(90deg) translateZ(-600px);
}

/* CEILING */
.ceiling {
  position:absolute;
  width:2000px;
  height:1200px;
  background:#f4f4f4;
  transform: rotateX(-90deg) translateZ(-600px);
}

/* LIGHT STRIPS */
.light {
  position:absolute;
  width:300px;
  height:10px;
  background:rgba(255,255,255,0.8);
  top:200px;
  left:50%;
  transform:translateX(-50%);
  box-shadow:0 0 20px rgba(255,255,255,0.6);
}

/* ART */
.art {
  position:absolute;
  cursor:pointer;
  transition:transform 0.3s ease;
}

.art img {
  width:240px;
}

.art:hover {
  transform:scale(1.05);
}

/* VIEWER */
#viewer {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.9);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:20;
}

#viewer img {
  max-width:90%;
  max-height:90%;
}

/* NAV (match index) */
.nav {
  position:fixed;
  top:20px;
  right:20px;
  display:flex;
  gap:30px;
  z-index:10;
}

.nav a {
  text-decoration:none;
  color:#000;
  font-size:20px;
  font-weight:300;
  transition:filter 0.3s;
}

.nav a:hover {
  filter:blur(1px);
}

/* CONTROLS */
.controls {
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:10px;
}

button {
  background:none;
  border:none;
  font-size:20px;
  cursor:pointer;
}

/* MOBILE */
@media(max-width:700px){
  .art img { width:150px; }
}

</style>
</head>

<body>

<div class="nav">
  <a href="photos.html">Photos</a>
  <a href="videos.html">Videos</a>
  <a href="music.html">Music</a>
  <a href="contact.html">Contact</a>
</div>

<div id="scene"></div>

<div id="viewer" onclick="this.style.display='none'">
  <img src="">
</div>

<div class="controls">
  <button onclick="rotate(-90)">←</button>
  <button onclick="rotate(90)">→</button>
</div>

<script>

const images = [/* KEEP YOUR IMAGE LIST HERE SAME AS BEFORE */];

const scene = document.getElementById('scene');
let rooms = [];
let currentRoom = 0;
let rotation = 0;

/* CREATE ROOM */
function createRoom(imgs){
  const room = document.createElement('div');
  room.className = 'room';

  const walls = ['front','right','back','left'];

  walls.forEach(side=>{
    const wall = document.createElement('div');
    wall.className = 'wall ' + side;

    for(let i=0;i<3;i++){
      if(!imgs.length) break;

      const art = document.createElement('div');
      art.className='art';
      art.style.left = (300 + i*450)+'px';
      art.style.top = (200 + (i%2)*300)+'px';

      const img = document.createElement('img');
      img.src = imgs.shift();

      img.onclick = ()=>{
        document.querySelector('#viewer img').src = img.src;
        document.getElementById('viewer').style.display='flex';
      };

      art.appendChild(img);
      wall.appendChild(art);
    }

    room.appendChild(wall);
  });

  const floor = document.createElement('div');
  floor.className='floor';

  const ceiling = document.createElement('div');
  ceiling.className='ceiling';

  const light = document.createElement('div');
  light.className='light';

  ceiling.appendChild(light);

  room.appendChild(floor);
  room.appendChild(ceiling);

  return room;
}

/* BUILD ROOMS */
let temp = [...images];
while(temp.length){
  rooms.push(createRoom(temp));
}

rooms.forEach((room,i)=>{
  if(i!==0) room.style.opacity=0;
  scene.appendChild(room);
});

/* ROTATE */
function rotate(deg){
  rotation += deg;
  rooms[currentRoom].style.transform =
    `translate(-50%,-50%) rotateY(${rotation}deg)`;
}

/* CHANGE ROOM */
function changeRoom(dir){
  rooms[currentRoom].style.opacity=0;
  currentRoom = (currentRoom + dir + rooms.length) % rooms.length;
  rotation = 0;
  rooms[currentRoom].style.transform =
    `translate(-50%,-50%) rotateY(0deg)`;
  rooms[currentRoom].style.opacity=1;
}

/* SWIPE */
let startX=0;
document.addEventListener('touchstart',e=>{
  startX=e.touches[0].clientX;
});

document.addEventListener('touchend',e=>{
  let endX=e.changedTouches[0].clientX;
  if(endX-startX>50) rotate(-90);
  if(startX-endX>50) rotate(90);
});

</script>

</body>
</html>
