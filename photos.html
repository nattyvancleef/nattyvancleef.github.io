<!DOCTYPE html>

<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Photos - nattyvancleef</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Helvetica+Neue:wght@300&display=swap');

body {
  margin:0;
  font-family:"Helvetica Neue", Arial, sans-serif;
  background:#f7f6f4;
  overflow-x:hidden;
}

/* NAV */
nav {
  position: fixed;
  top: clamp(15px, 3vw, 20px);
  right: clamp(15px, 3vw, 20px);
  z-index: 10;
}

nav ul {
  display:flex;
  gap: clamp(12px, 3vw, 30px);
  list-style:none;
  margin:0;
  padding:0;
}

nav a {
  text-decoration:none;
  color:#000;
  font-size: clamp(18px, 5vw, 48px);
  font-weight:300;
  transition: filter 0.3s;
}

nav a:hover {
  filter: blur(1px);
}

/* NVC */
.nvc {
  position:fixed;
  top: clamp(15px, 3vw, 20px);
  left: clamp(15px, 3vw, 20px);
  text-decoration:none;
  color:#000;
  font-size: clamp(14px, 4vw, 32px);
  letter-spacing:2px;
  z-index:10;
  opacity:0.6;
}

/* GRID */
.gallery {
  padding: clamp(90px, 12vw, 120px) clamp(15px, 5vw, 40px);
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(clamp(130px, 30vw, 200px), 1fr));
  gap: clamp(10px, 2vw, 20px);
}

.gallery img,
.card img {
  width:100%;
  cursor:pointer;
  transition:0.3s;
}

.gallery img:hover,
.card img:hover {
  transform:scale(1.02);
}

.card {
  width:100%;
}

/* VIEWER */
#viewer {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.9);
  display:none;
  align-items:center;
  justify-content:center;
}

#viewer img {
  max-width:90%;
  max-height:90%;
}

/* DESKTOP ONLY (matches index page) */
@media (min-width: 600px) {
  nav a {
    font-size: 30px;
  }

  .nvc {
    font-size: 14px;
  }
}

</style>
</head>
