@import url('https://fonts.googleapis.com/css2?family=Helvetica+Neue:wght@300&display=swap');

body {
  margin:0;
  font-family:"Helvetica Neue", Arial, sans-serif;
  background:#f7f6f4;
  overflow-x: hidden;
}

/* NAV (top right) */
nav {
  position: fixed;
  top:20px;
  right:20px;
  z-index: 10;
}
nav ul {
  display:flex;
  gap:30px;
  list-style:none;
  margin:0;
  padding:0;
}
nav a {
  text-decoration:none;
  color:#000;
  font-size:24px;
  font-weight: 300;
  transition: filter 0.3s;
}
nav a:hover { filter: blur(1px); }

/* NVC (top left) */
.nvc {
  position:fixed;
  top:20px;
  left:20px;
  text-decoration:none;
  color:#000;
  font-size:14px;
  letter-spacing:2px;
  z-index:10;
}

/* GRID for images and cards */
.gallery {
  padding:120px 40px;
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(200px,1fr));
  gap:20px;
}

/* Style for original images in gallery */
.gallery img {
  width:100%;
  cursor:pointer;
  transition:0.3s;
}
.gallery img:hover {
  transform:scale(1.02);
}

/* Style for added cards with images */
.card {
  width: 100%;
}
.card img {
  width:100%;
  cursor:pointer;
  transition:0.3s;
}
.card img:hover {
  transform:scale(1.02);
}

/* Viewer overlay for clicked images */
#viewer {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.9);
  display:none;
  align-items:center;
  justify-content:center;
}
#viewer img {
  max-width:90%;
  max-height:90%;
}
</style>
</head>
