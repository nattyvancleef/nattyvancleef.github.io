<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Photos</title>

<style>
body {
  margin:0;
  font-family:"Helvetica Neue", Arial, sans-serif;
  background:#f7f6f4;
}

/* NAV */
nav {
  position: fixed;
  top:20px;
  right:20px;
}
nav ul {
  display:flex;
  gap:30px;
  list-style:none;
}
nav a {
  text-decoration:none;
  color:#000;
  font-size:24px;
}
nav a:hover { filter: blur(1px); }

/* NVC */
.nvc {
  position:fixed;
  top:20px;
  left:20px;
  text-decoration:none;
  color:#000;
  font-size:14px;
  letter-spacing:2px;
}

/* GRID */
.gallery {
  padding:120px 40px;
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(200px,1fr));
  gap:20px;
}

.gallery img {
  width:100%;
  cursor:pointer;
  transition:0.3s;
}
.gallery img:hover {
  transform:scale(1.02);
}

/* VIEWER */
#viewer {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.9);
  display:none;
  align-items:center;
  justify-content:center;
}
#viewer img {
  max-width:90%;
  max-height:90%;
}
</style>
</head>

<body>

<a href="index.html" class="nvc">NVC</a>

<nav>
<ul>
<li><a href="photos.html">Photos</a></li>
<li><a href="videos.html">Videos</a></li>
<li><a href="music.html">Music</a></li>
<li><a href="contact.html">Contact</a></li>
</ul>
</nav>

<div class="gallery">
  <img src="IMG_4222.JPG">
  <img src="P1000170.JPG">
  <img src="DSCF2287.JPEG">
  <img src="DSCF5912.JPEG">
</div>

<div id="viewer" onclick="this.style.display='none'">
  <img src="">
</div>

<script>
document.querySelectorAll('.gallery img').forEach(img=>{
  img.onclick = ()=>{
    document.querySelector('#viewer img').src = img.src;
    document.getElementById('viewer').style.display='flex';
  };
});
</script>

</body>
</html>
