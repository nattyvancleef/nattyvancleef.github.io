<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Music - nattyvancleef</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Helvetica+Neue:wght@300&display=swap');

body {
  margin: 0;
  font-family: 'Helvetica Neue', Arial, sans-serif;
  background: radial-gradient(circle at center, #111 0%, #000 60%);
  color: #fff;
  overflow: hidden;
}

/* NAV */
nav {
  position: fixed;
  top: 20px;
  right: 20px;
  z-index: 20;
}
nav ul {
  display: flex;
  gap: 30px;
  list-style: none;
  margin: 0;
  padding: 0;
}
nav a {
  color: #fff;
  text-decoration: none;
  font-size: 24px;
  font-weight: 300;
  transition: filter 0.3s;
}
nav a:hover { filter: blur(1px); }

/* NVC */
.return-arrow {
  position: fixed;
  top: 20px;
  left: 20px;
  color: #fff;
  text-decoration: none;
  font-size: 14px;
  letter-spacing: 2px;
  z-index: 20;
  opacity: 0.6;
}

/* ========================= */
/* 🎛️ JUKEBOX CABINET FRAME */
/* ========================= */

.cabinet {
  position: absolute;
  inset: 50px;
  border-radius: 28px;

  /* chrome frame */
  border: 2px solid rgba(255,255,255,0.15);
  box-shadow:
    inset 0 0 40px rgba(255,255,255,0.08),
    0 0 60px rgba(255,255,255,0.05);

  background: linear-gradient(
    145deg,
    rgba(30,30,30,0.6),
    rgba(0,0,0,0.9)
  );

  backdrop-filter: blur(12px);
  overflow: hidden;
}

/* glowing glass panel */
.cabinet::before {
  content: "";
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at center,
    rgba(255,255,255,0.08),
    transparent 60%);
  pointer-events: none;
}

/* TITLE STRIP */
.header {
  text-align: center;
  padding: 20px;
  letter-spacing: 3px;
  font-size: 12px;
  opacity: 0.7;
}

/* TRACK LIST */
.jukebox {
  display: flex;
  flex-direction: column;
  gap: 14px;
  align-items: center;
  justify-content: center;
  height: calc(100% - 80px);
}

/* TRACK SLOT */
.track {
  width: min(520px, 80vw);
  padding: 16px 18px;
  border-radius: 12px;

  background: rgba(20,20,20,0.65);
  border: 1px solid rgba(255,255,255,0.15);

  font-size: 18px;
  text-align: left;
  cursor: pointer;

  position: relative;
  overflow: hidden;

  transition: transform 0.25s ease, border 0.25s ease;
}

.track:hover {
  transform: scale(1.02);
  border-color: rgba(255,255,255,0.4);
}

/* play icon */
.track::before {
  content: "▶";
  margin-right: 10px;
  opacity: 0.7;
}

/* ACTIVE TRACK */
.track.active {
  border-color: rgba(255,255,255,0.7);
  background: rgba(40,40,40,0.9);
}

/* 📼 CASSETTE INSERT ANIMATION */
.track.active::after {
  content: "";
  position: absolute;
  top: 0;
  left: -120%;
  width: 120%;
  height: 100%;
  background: linear-gradient(
    120deg,
    transparent,
    rgba(255,255,255,0.25),
    transparent
  );
  animation: slide 0.8s ease forwards;
}

@keyframes slide {
  from { left: -120%; }
  to { left: 120%; }
}

/* ARROWS */
.arrow {
  position: fixed;
  bottom: 60px;
  font-size: 24px;
  cursor: pointer;
  z-index: 20;
}
#leftArrow { left: 48%; }
#rightArrow { right: 48%; }

/* OVERLAY */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  opacity: 0;
  pointer-events: none;
  transition: 0.3s;
}
.overlay.active {
  opacity: 1;
  pointer-events: all;
}

/* MOBILE TWEAK ONLY (same system, just spacing) */
@media (max-width: 600px){

  .cabinet {
    inset: 20px;
    border-radius: 20px;
  }

  .track {
    font-size: 16px;
    padding: 14px 16px;
  }

  nav a {
    font-size: 20px;
  }

  .return-arrow {
    font-size: 16px;
  }
}
</style>
</head>

<body>

<a href="index.html" class="return-arrow">NVC</a>

<nav>
<ul>
<li><a href="photos.html">Photos</a></li>
<li><a href="videos.html">Videos</a></li>
<li><a href="music.html">Music</a></li>
<li><a href="contact.html">Contact</a></li>
</ul>
</nav>

<div class="cabinet">

  <div class="header">JUKEBOX SYSTEM</div>

  <div class="jukebox" id="jukebox"></div>

</div>

<div id="leftArrow" class="arrow">←</div>
<div id="rightArrow" class="arrow">→</div>
<div id="overlay" class="overlay"></div>

<script>
const pages = [
[
{ name:"Paul and Djon", src:"paul and djon.mp3" },
{ name:"Almostblue", src:"Almostbloue.mp3" },
{ name:"Architecture", src:"Architecture2.mp3" },
{ name:"bailey", src:"bailey3.mp3" },
{ name:"BODYOFME", src:"BODYOFME RM.mp3" },
{ name:"deathproof", src:"deathproof2.mp3" }
],
[
{ name:"...", src:"" },
{ name:"...", src:"" },
{ name:"...", src:"" },
{ name:"...", src:"" },
{ name:"...", src:"" },
{ name:"...", src:"" }
],
[
{ name:"...", src:"" },
{ name:"...", src:"" },
{ name:"...", src:"" },
{ name:"...", src:"" },
{ name:"...", src:"" }
]
];

let currentPage = 0;
let currentAudio = null;

const jukebox = document.getElementById("jukebox");

function build(){
  jukebox.innerHTML = "";

  pages[currentPage].forEach((t,i)=>{
    const div = document.createElement("div");
    div.className = "track";
    div.textContent = t.name;

    div.onclick = () => play(i, div);

    jukebox.appendChild(div);
  });
}

function play(i, el){

  const t = pages[currentPage][i];

  document.querySelectorAll(".track").forEach(x=>{
    x.classList.remove("active");
  });

  if(currentAudio){
    currentAudio.pause();
  }

  if(t.src){
    const audio = new Audio(t.src);
    audio.play();
    currentAudio = audio;

    el.classList.add("active");

    overlay.classList.add("active");

    audio.onended = () => {
      overlay.classList.remove("active");
      el.classList.remove("active");
    };
  }
}

leftArrow.onclick = () => {
  currentPage = (currentPage - 1 + pages.length) % pages.length;
  if(currentAudio) currentAudio.pause();
  overlay.classList.remove("active");
  build();
};

rightArrow.onclick = () => {
  currentPage = (currentPage + 1) % pages.length;
  if(currentAudio) currentAudio.pause();
  overlay.classList.remove("active");
  build();
};

overlay.onclick = () => {
  if(currentAudio) currentAudio.pause();
  overlay.classList.remove("active");
};

build();
</script>

</body>
</html>
