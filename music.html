<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Music - nattyvancleef</title>

<style>
body {
  margin: 0;
  background: #000;
  color: #fff;
  font-family: Helvetica, Arial, sans-serif;
  overflow: hidden;
}

/* NAV */
nav {
  position: fixed;
  top: 20px;
  right: 20px;
  z-index: 10;
}
nav ul {
  display: flex;
  gap: 30px;
  list-style: none;
}
nav a {
  color: #fff;
  text-decoration: none;
  font-size: 24px;
}
nav a:hover { filter: blur(1px); }

.return-arrow {
  position: fixed;
  top: 20px;
  left: 20px;
  color: white;
  text-decoration: none;
}

/* UI */
.track-ui {
  position: absolute;
  transform: translate(-50%, -50%);
  width: 140px;
  text-align: center;
  font-size: 12px;
  transition: 0.2s;
}

.track-ui:hover {
  opacity: 0.7;
}

.progress {
  height: 5px;
  background: rgba(255,255,255,0.2);
  margin-top: 5px;
  cursor: pointer;
}
.progress-bar {
  height: 100%;
  width: 0%;
  background: white;
}
.time {
  font-size: 10px;
  opacity: 0.6;
  text-align: right;
}

/* arrows */
.arrow {
  position: fixed;
  bottom: 160px;
  font-size: 22px;
  cursor: pointer;
}
#leftArrow { left: 49%; }
#rightArrow { right: 49%; }

/* overlay */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  opacity: 0;
  pointer-events: none;
  transition: 0.3s;
}
.overlay.active {
  opacity: 1;
  pointer-events: all;
}
</style>
</head>

<body>

<a href="index.html" class="return-arrow">NVC</a>

<nav>
<ul>
<li><a href="photos.html">Photos</a></li>
<li><a href="videos.html">Videos</a></li>
<li><a href="music.html">Music</a></li>
<li><a href="contact.html">Contact</a></li>
</ul>
</nav>

<div id="leftArrow" class="arrow">←</div>
<div id="rightArrow" class="arrow">→</div>
<div id="overlay" class="overlay"></div>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let w = canvas.width = window.innerWidth;
let h = canvas.height = window.innerHeight;

window.addEventListener("resize", () => {
  w = canvas.width = window.innerWidth;
  h = canvas.height = window.innerHeight;
});

/* STARS */
const layers = [
  {count:60,speed:0.2,size:1},
  {count:40,speed:0.5,size:2},
  {count:25,speed:1,size:3}
];

let stars = layers.map(l =>
  Array.from({length:l.count},()=>({
    x:Math.random()*w,
    y:Math.random()*h
  }))
);

/* PAGES */
const pages = [
[
{ name:"Paul and Djon", src:"paul and djon.mp3", type:"lava" },
{ name:"Almostblue", src:"Almostbloue.mp3", type:"ice" },
{ name:"Architecture", src:"Architecture2.mp3", type:"gas" },
{ name:"bailey", src:"bailey3.mp3", type:"rock" },
{ name:"BODYOFME", src:"BODYOFME RM.mp3", type:"toxic" },
{ name:"deathproof", src:"deathproof2.mp3", type:"ocean" }
],
[
{ name:"track 7", src:"", type:"lava" },
{ name:"track 8", src:"", type:"ice" },
{ name:"track 9", src:"", type:"gas" }
],
[
{ name:"track 10", src:"", type:"rock" },
{ name:"track 11", src:"", type:"toxic" }
]
];

let currentPage = 0;
let currentAudio = null;
let currentIndex = null;
let zoomed = null;
let hovered = null;

/* UI */
function buildUI(){
  document.querySelectorAll(".track-ui").forEach(e=>e.remove());

  pages[currentPage].forEach(s=>{
    const ui=document.createElement("div");
    ui.className="track-ui";
    ui.innerHTML=`
      <div>${s.name}</div>
      <div class="progress"><div class="progress-bar"></div></div>
      <div class="time">0:00</div>
    `;
    document.body.appendChild(ui);

    s.ui=ui;
    s.bar=ui.querySelector(".progress-bar");
    s.time=ui.querySelector(".time");

    ui.querySelector(".progress").addEventListener("click",e=>{
      if(!currentAudio) return;
      const rect=e.target.getBoundingClientRect();
      const p=(e.clientX-rect.left)/rect.width;
      currentAudio.currentTime=p*currentAudio.duration;
    });
  });
}
buildUI();

/* PIXEL PLANET */
function pixelPlanet(x,y,size,color,react=0){
  const step=4;

  for(let i=-size;i<size;i+=step){
    for(let j=-size;j<size;j+=step){
      if(i*i+j*j < size*size){

        let shade = (i+j)%8===0 ? 0.2 : 0;
        let pulse = react * 0.5;

        ctx.fillStyle = `rgba(${color[0]},${color[1]},${color[2]},1)`;
        ctx.fillRect(x+i,y+j,step,step);

        if(shade){
          ctx.fillStyle="rgba(255,255,255,0.1)";
          ctx.fillRect(x+i,y+j,step,step);
        }

        if(pulse){
          ctx.fillStyle="rgba(255,255,255,"+pulse+")";
          ctx.fillRect(x+i,y+j,step,step);
        }
      }
    }
  }
}

/* DRAW */
let time=0;

function draw(){
  requestAnimationFrame(draw);
  ctx.clearRect(0,0,w,h);
  time+=0.02;

  layers.forEach((l,i)=>{
    stars[i].forEach(s=>{
      s.y+=l.speed;
      if(s.y>h) s.y=0;
      ctx.fillStyle="#fff";
      ctx.fillRect(s.x,s.y,l.size,l.size);
    });
  });

  const songs=pages[currentPage];
  const step=Math.PI*2/songs.length;
  const radius = zoomed!==null ? 0 : 180;

  let audioLevel = currentAudio ? Math.abs(Math.sin(time*8)) : 0;

  songs.forEach((s,i)=>{
    const angle=i*step;

    let x=w/2 + Math.cos(angle)*radius;
    let y=h/2 + Math.sin(angle)*radius;

    let size = 25;

    if(hovered===i) size = 30;
    if(zoomed===i) size = 90;

    let react = (zoomed===i) ? audioLevel : 0;

    pixelPlanet(x,y,size,[255,255,255],react);

    // glow
    if(hovered===i){
      ctx.shadowBlur=20;
      ctx.shadowColor="white";
    } else {
      ctx.shadowBlur=0;
    }

    s.ui.style.display = (zoomed!==null && zoomed!==i) ? "none":"block";
    s.ui.style.left=x+"px";
    s.ui.style.top=(y+60)+"px";

    s.x=x; s.y=y;
  });
}
draw();

/* HOVER */
canvas.addEventListener("mousemove",e=>{
  hovered=null;
  pages[currentPage].forEach((s,i)=>{
    if(Math.hypot(e.clientX-s.x,e.clientY-s.y)<30){
      hovered=i;
    }
  });
});

/* CLICK */
canvas.addEventListener("click", e => {

  let clickedPlanet = false;

  pages[currentPage].forEach((s,i)=>{
    if(Math.hypot(e.clientX-s.x,e.clientY-s.y)<30){

      clickedPlanet = true;

      if(zoomed===i){
        zoomed=null;
        overlay.classList.remove("active");
        if(currentAudio) currentAudio.pause();
        currentIndex=null;
        return;
      }

      zoomed=i;
      overlay.classList.add("active");

      if(!s.src) return;

      if(currentAudio) currentAudio.pause();

      currentAudio=new Audio(s.src);
      currentAudio.play();
      currentIndex=i;

      currentAudio.ontimeupdate=()=>{
        const p=currentAudio.currentTime/currentAudio.duration;
        s.bar.style.width=(p*100)+"%";

        let m=Math.floor(currentAudio.currentTime/60);
        let sec=Math.floor(currentAudio.currentTime%60).toString().padStart(2,"0");
        s.time.textContent=`${m}:${sec}`;
      };
    }
  });

  // click away = EXIT + STOP
  if(!clickedPlanet && zoomed!==null){
    zoomed=null;
    overlay.classList.remove("active");
    if(currentAudio) currentAudio.pause();
    currentIndex=null;
  }
});

/* ARROWS */
leftArrow.onclick=()=>{
  currentPage = (currentPage-1+pages.length)%pages.length;
  buildUI();
};
rightArrow.onclick=()=>{
  currentPage = (currentPage+1)%pages.length;
  buildUI();
};
</script>

</body>
</html>
