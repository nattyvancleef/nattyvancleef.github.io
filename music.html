<!DOCTYPE html>
<html>
<head>
  <title>Music - nattyvancleef</title>
  <meta charset="UTF-8" />
  <style>
    body {
      margin: 0;
      font-family: "Helvetica Neue", Arial, sans-serif;
      background: #f7f6f4;
      color: #1a1a1a;
    }

    /* Return arrow styled as a keyhole with blur effect */
    .return-arrow {
      position: fixed;
      top: 20px;
      left: 20px;
      font-size: 24px;
      color: #fff;
      text-decoration: none;
      padding: 10px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(4px);
      transition: filter 0.3s, background 0.3s;
      z-index: 10;
    }

    .return-arrow:hover {
      filter: blur(1px);
      background: rgba(255, 255, 255, 0.3);
    }

    section {
      padding: 50px 20px;
      max-width: 1200px;
      margin: auto;
      text-align: center;
    }

    h2 {
      font-size: 2em;
      margin-bottom: 20px;
    }

    p {
      color: #666;
      line-height: 1.6;
    }

    .track {
      margin-bottom: 30px;
      padding: 20px;
      border: 1px solid #ddd;
      border-radius: 10px;
    }

    .track-title {
      font-size: 14px;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>

<!-- Return arrow as keyhole -->
<a href="index.html" class="return-arrow" aria-label="Return to homepage">
  &#8592;
</a>

<section id="music">
  <h2>Music</h2>
  <p>Unfinished ideas, sketches, and beats.</p>
  <div class="track">
    <div class="track-title">Track 01 — Untitled</div>
    <audio controls>
      <source src="track1.mp3" type="audio/mpeg" />
    </audio>
  </div>
  <div class="track">
    <div class="track-title">Paul and Djon</div>
    <audio controls>
      <source src="MYWEBSITE/paul_and_djon.mp3" type="audio/mpeg" />
      Your browser does not support the audio element.
    </audio>
  </div>
</section>

</body>
</html>
