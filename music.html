<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Music - nattyvancleef</title>

<style>
body {
  margin: 0;
  background: #000;
  color: #fff;
  font-family: Helvetica, Arial, sans-serif;
  overflow: hidden;
}

/* NAV */
nav {
  position: fixed;
  top: 20px;
  right: 20px;
}
nav ul {
  display: flex;
  gap: 30px;
  list-style: none;
}
nav a {
  color: white;
  text-decoration: none;
  font-size: 22px;
}

.return-arrow {
  position: fixed;
  top: 20px;
  left: 20px;
  color: white;
  text-decoration: none;
}

/* CANVAS */
canvas {
  position: fixed;
  inset: 0;
}

/* SLIDERS */
#seekSlider {
  position: fixed;
  bottom: 10px;
  width: 70%;
  left: 15%;
}

#pageSlider {
  position: fixed;
  bottom: 40px;
  width: 200px;
  left: 50%;
  transform: translateX(-50%);
}
</style>
</head>

<body>

<a href="index.html" class="return-arrow">NVC</a>

<nav>
<ul>
<li><a href="photos.html">Photos</a></li>
<li><a href="videos.html">Videos</a></li>
<li><a href="music.html">Music</a></li>
<li><a href="contact.html">Contact</a></li>
</ul>
</nav>

<canvas id="canvas"></canvas>
<input type="range" id="pageSlider" min="0" max="1" step="1" value="0">
<input type="range" id="seekSlider" min="0" max="100" value="0">

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let w = canvas.width = window.innerWidth;
let h = canvas.height = window.innerHeight;

window.addEventListener("resize", () => {
  w = canvas.width = window.innerWidth;
  h = canvas.height = window.innerHeight;
});

/* ================= SONG DATA ================= */

const pages = [
[
{ name:"Paul and Djon", src:"paul and djon.mp3" },
{ name:"Almostblue", src:"Almostbloue.mp3" },
{ name:"Architecture", src:"Architecture2.mp3" },
{ name:"bailey", src:"bailey3.mp3" },
{ name:"BODYOFME", src:"BODYOFME RM.mp3" },
{ name:"deathproof", src:"deathproof2.mp3" }
],
[
{ name:"keep your word", src:"Keep Your Word.mp3" },
{ name:"pawnshop.bt", src:"pawnshop.bt.mp3" },
{ name:"said she", src:"said she.2.mp3" },
{ name:"stickman", src:"stickman.mp3" },
{ name:"vikingsaga", src:"vikingsaga.mp3" }
]
];

let currentPage = 0;

/* ================= AUDIO ================= */

let currentAudio = null;

/* ================= VISUAL ================= */

let rotation = 0;
let hovered = null;
let zoom = 0;

const colors = [
"#ff3b3b","#00d4ff","#ffd93b",
"#8aff3b","#ff7af6","#3b8aff"
];

/* ================= DRAW ================= */

function draw() {
  requestAnimationFrame(draw);
  ctx.clearRect(0,0,w,h);

  rotation += 0.002;

  const songs = pages[currentPage];
  const step = Math.PI*2 / songs.length;

  ctx.save();
  ctx.translate(w/2, h/2);
  ctx.rotate(rotation);

  songs.forEach((s,i)=>{
    const angle = i*step;
    const r = 180;

    let x = Math.cos(angle)*r;
    let y = Math.sin(angle)*r;

    let size = 25;

    if (hovered === i) size = 35;

    // PLANET
    ctx.beginPath();
    ctx.arc(x,y,size,0,Math.PI*2);
    ctx.fillStyle = colors[i%colors.length];
    ctx.shadowBlur = hovered===i ? 20 : 0;
    ctx.shadowColor = colors[i%colors.length];
    ctx.fill();

    // RING
    ctx.beginPath();
    ctx.ellipse(x,y,size+10,8,0.5,0,Math.PI*2);
    ctx.strokeStyle = "white";
    ctx.stroke();

    // TEXT
    ctx.shadowBlur = 0;
    ctx.fillStyle="yellow";
    ctx.textAlign="center";
    ctx.fillText(s.name,x,y+50);

    // STORE position for click
    s._x = x;
    s._y = y;
  });

  ctx.restore();
}

draw();

/* ================= MOUSE ================= */

canvas.addEventListener("mousemove", e=>{
  const mx = e.clientX - w/2;
  const my = e.clientY - h/2;

  hovered = null;

  const songs = pages[currentPage];

  songs.forEach((s,i)=>{
    const dx = mx - s._x;
    const dy = my - s._y;
    if (Math.hypot(dx,dy) < 30) hovered = i;
  });
});

canvas.addEventListener("click", ()=>{
  if (hovered === null) return;

  const song = pages[currentPage][hovered];

  if (currentAudio) currentAudio.pause();

  currentAudio = new Audio(song.src);
  currentAudio.play();

  zoom = hovered;
});

/* ================= SLIDERS ================= */

document.getElementById("pageSlider").addEventListener("input", e=>{
  currentPage = parseInt(e.target.value);
});

const seek = document.getElementById("seekSlider");

function updateSeek(){
  if(currentAudio){
    seek.max = currentAudio.duration || 0;
    seek.value = currentAudio.currentTime;
  }
  requestAnimationFrame(updateSeek);
}
updateSeek();

seek.addEventListener("input", ()=>{
  if(currentAudio){
    currentAudio.currentTime = seek.value;
  }
});

</script>

</body>
</html>
