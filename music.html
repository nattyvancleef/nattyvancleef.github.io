<!DOCTYPE html>
<html>
<head>
  <title>Music - nattyvancleef</title>
  <meta charset="UTF-8" />

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@300;400&family=Cormorant+Garamond:wght@300&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Cormorant Garamond', serif;
      background: radial-gradient(circle at 20% 30%, #1a1a2e, #000);
      color: #fff;
      overflow-x: hidden;
    }

    /* Subtle stars */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image: 
        radial-gradient(white 1px, transparent 1px),
        radial-gradient(white 1px, transparent 1px);
      background-size: 40px 40px, 80px 80px;
      opacity: 0.15;
      z-index: -2;
    }

    /* Shooting stars */
    .shooting-star {
      position: fixed;
      width: 2px;
      height: 80px;
      background: linear-gradient(white, transparent);
      opacity: 0.6;
      transform: rotate(45deg);
      animation: shoot 6s linear infinite;
      z-index: -1;
    }

    .shooting-star:nth-child(1) {
      top: 10%;
      left: 20%;
      animation-delay: 0s;
    }

    .shooting-star:nth-child(2) {
      top: 30%;
      left: 70%;
      animation-delay: 3s;
    }

    @keyframes shoot {
      0% {
        transform: translate(0, 0) rotate(45deg);
        opacity: 0;
      }
      10% {
        opacity: 1;
      }
      100% {
        transform: translate(300px, 300px) rotate(45deg);
        opacity: 0;
      }
    }

    .return-arrow {
      position: fixed;
      top: 20px;
      left: 20px;
      color: #fff;
      text-decoration: none;
      padding: 10px;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(4px);
      z-index: 10;
    }

    .return-arrow::after {
      content: "NVC";
      font-family: 'Orbitron', sans-serif;
      font-size: 12px;
      letter-spacing: 2px;
    }

    section {
      padding: 80px 20px;
      max-width: 700px;
      margin: auto;
      text-align: center;
    }

    h2 {
      font-family: 'Orbitron', sans-serif;
      letter-spacing: 3px;
      margin-bottom: 10px;
    }

    p {
      color: rgba(255,255,255,0.6);
      margin-bottom: 40px;
    }

    .track {
      margin-bottom: 40px;
      padding: 10px;
      cursor: pointer;
    }

    .track-title {
      font-size: 18px;
      color: #b8c6ff;
      text-shadow: 0 0 10px rgba(150,180,255,0.4);
      margin-bottom: 10px;
      transition: 0.3s;
    }

    .track:hover .track-title {
      filter: blur(1px);
      opacity: 0.7;
    }

    /* Progress bar */
    .progress {
      width: 100%;
      height: 2px;
      background: rgba(255,255,255,0.2);
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: #b8c6ff;
      transition: width 0.1s linear;
    }

    /* Mobile tweaks */
    @media (max-width: 600px) {
      .track-title {
        font-size: 16px;
      }

      section {
        padding: 60px 15px;
      }
    }

  </style>
</head>

<body>

<!-- Shooting stars -->
<div class="shooting-star"></div>
<div class="shooting-star"></div>

<a href="index.html" class="return-arrow"></a>

<section>
  <h2>MUSIC</h2>
  <p>Unfinished ideas, sketches, and beats.</p>

  <!-- TRACK -->
  <div class="track" data-audio="audio1">
    <div class="track-title">Paul and Djon</div>
    <audio id="audio1" src="paul and djon.mp3"></audio>

    <div class="progress">
      <div class="progress-bar"></div>
    </div>
  </div>

</section>

<script>
  document.querySelectorAll('.track').forEach(track => {
    const audio = document.getElementById(track.dataset.audio);
    const progressBar = track.querySelector('.progress-bar');

    // DESKTOP: hover play
    track.addEventListener('mouseenter', () => {
      audio.currentTime = 0;
      audio.play();
    });

    track.addEventListener('mouseleave', () => {
      audio.pause();
      audio.currentTime = 0;
    });

    // MOBILE: tap play
    track.addEventListener('click', () => {
      if (audio.paused) {
        audio.play();
      } else {
        audio.pause();
      }
    });

    // Progress bar update
    audio.addEventListener('timeupdate', () => {
      const progress = (audio.currentTime / audio.duration) * 100;
      progressBar.style.width = progress + "%";
    });

    audio.addEventListener('ended', () => {
      progressBar.style.width = "0%";
    });
  });
</script>

</body>
</html>
