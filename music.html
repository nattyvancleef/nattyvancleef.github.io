<!DOCTYPE html>
<html>
<head>
  <title>Music - nattyvancleef</title>
  <meta charset="UTF-8" />
  <style>
    /* ... (your existing styles) ... */
    body { margin: 0; font-family: 'Helvetica Neue', Arial, sans-serif; background: #000; color: #fff; overflow-x: hidden; }
    #circleCanvas {
      position: fixed;
      inset: 0;
      z-index: 2;
      cursor: grab;
    }
    .visualiser {
      width: 100%;
      height: 60px;
    }
    #seekSlider {
      width: 80%;
      margin: 20px auto;
      display: block;
    }
  </style>
</head>
<body>

<canvas id="circleCanvas"></canvas>
<div style="position:fixed; bottom:10px; width:100%; text-align:center; z-index:3;">
  <input type="range" id="seekSlider" min="0" max="100" value="0" step="0.1"/>
</div>

<!-- Your existing content ... -->
<!-- (keep your existing section with tracks) -->

<script>
const circleCanvas = document.getElementById('circleCanvas');
const ctx = circleCanvas.getContext('2d');
let cw = window.innerWidth;
let ch = window.innerHeight;
circleCanvas.width = cw;
circleCanvas.height = ch;

window.addEventListener('resize', () => {
  cw = window.innerWidth;
  ch = window.innerHeight;
  circleCanvas.width = cw;
  circleCanvas.height = ch;
});

// Define tracks for circular wheel
const tracks = [
  { name: 'Paul and Djon', audioId: 'audio1', angle: 0 },
  { name: 'Almostbloue', audioId: 'audio2', angle: Math.PI / 4 },
  { name: 'Architecture', audioId: 'audio3', angle: Math.PI / 2 },
  { name: 'bailey', audioId: 'audio4', angle: 3 * Math.PI / 4 },
  { name: 'BODYOFME', audioId: 'audio5', angle: Math.PI },
  { name: 'deathproof', audioId: 'audio6', angle: 5 * Math.PI / 4 },
  { name: 'keep your word', audioId: 'audio7', angle: 3 * Math.PI / 2 },
  { name: 'pawnshop.bt', audioId: 'audio8', angle: 7 * Math.PI / 4 },
  { name: 'said she', audioId: 'audio9', angle: 9 * Math.PI / 4 },
  { name: 'stickman', audioId: 'audio10', angle: 10 * Math.PI / 4 },
  { name: 'vikingsaga', audioId: 'audio11', angle: 11 * Math.PI / 4 },
];

let wheelRotation = 0; // for dragging
let isDragging = false;
let lastX = 0;
let currentTrack = null;
let currentAudio = null;

// Draw the circular wheel
function drawWheel() {
  ctx.clearRect(0, 0, cw, ch);
  ctx.save();
  ctx.translate(cw/2, ch/2);
  ctx.rotate(wheelRotation);

  const radius = 150; // radius of wheel
  tracks.forEach(track => {
    const angle = track.angle;
    const x = Math.cos(angle) * radius;
    const y = Math.sin(angle) * radius;

    ctx.beginPath();
    ctx.arc(x, y, 20, 0, Math.PI * 2);
    ctx.fillStyle = 'white';
    ctx.fill();

    ctx.fillStyle = 'yellow';
    ctx.font = '12px Helvetica Neue';
    ctx.fillText(track.name, x - 20, y + 35);
  });

  ctx.restore();

  requestAnimationFrame(drawWheel);
}

// Animate the visualizer (more movement)
const visualizerCanvas = document.querySelector('.visualiser');
const vCtx = visualizerCanvas.getContext('2d');
let vWidth = visualizerCanvas.clientWidth;
let vHeight = visualizerCanvas.clientHeight;

function resizeVisualizer() {
  vWidth = visualizerCanvas.clientWidth;
  vHeight = visualizerCanvas.clientHeight;
  visualizerCanvas.width = vWidth;
  visualizerCanvas.height = vHeight;
}
window.addEventListener('resize', resizeVisualizer);

let angle = 0;

function animateVisualizer() {
  requestAnimationFrame(animateVisualizer);
  vCtx.clearRect(0, 0, vWidth, vHeight);
  // Create moving circles or waveforms for more movement
  for (let i = 0; i < 5; i++) {
    const x = vWidth/2 + Math.sin(angle + i) * (vWidth/3);
    const y = vHeight/2 + Math.cos(angle + i) * (vHeight/3);
    vCtx.beginPath();
    vCtx.arc(x, y, 10 + Math.sin(angle + i*2)*5, 0, Math.PI*2);
    vCtx.fillStyle = `rgba(255,255,255,${0.2 + Math.sin(angle + i)*0.3})`;
    vCtx.fill();
  }
  angle += 0.02;
}
animateVisualizer();

// Drag interactions for wheel
circleCanvas.addEventListener('mousedown', (e) => {
  isDragging = true;
  lastX = e.clientX;
});
circleCanvas.addEventListener('mouseup', () => { isDragging = false; });
circleCanvas.addEventListener('mousemove', (e) => {
  if (isDragging) {
    const deltaX = e.clientX - lastX;
    wheelRotation += deltaX * 0.01; // control speed
    lastX = e.clientX;
  }
});

// Touch controls
circleCanvas.addEventListener('touchstart', (e) => {
  isDragging = true;
  lastX = e.touches[0].clientX;
});
circleCanvas.addEventListener('touchend', () => { isDragging = false; });
circleCanvas.addEventListener('touchmove', (e) => {
  if (isDragging) {
    const deltaX = e.touches[0].clientX - lastX;
    wheelRotation += deltaX * 0.01;
    lastX = e.touches[0].clientX;
  }
});

// Detect click on a track
circleCanvas.addEventListener('click', () => {
  // Find closest track to pointer
  const rect = circleCanvas.getBoundingClientRect();
  const centerX = rect.left + cw/2;
  const centerY = rect.top + ch/2;
  const mouseX = event.clientX - rect.left - cw/2;
  const mouseY = event.clientY - rect.top - ch/2;

  // Calculate angle of click
  const clickAngle = Math.atan2(mouseY, mouseX) - wheelRotation;

  let closestTrack = null;
  let minDiff = Math.PI;
  tracks.forEach(track => {
    let diff = Math.abs(track.angle - clickAngle);
    if (diff > Math.PI) diff = Math.abs(diff - 2*Math.PI);
    if (diff < minDiff) {
      minDiff = diff;
      closestTrack = track;
    }
  });
  if (closestTrack) {
    // Play the track
    selectTrack(closestTrack);
  }
});

// Select and play track
function selectTrack(track) {
  // Pause previous
  if (currentAudio) {
    currentAudio.pause();
  }

  // Set current track
  currentAudio = document.getElementById(track.audioId);
  currentAudio.currentTime = 0;
  currentAudio.play();
  // Update active class for your UI if needed
  document.querySelectorAll('.track').forEach(t => t.classList.remove('active'));
  document.querySelector(`.track[data-audio="${track.audioId}"]`).classList.add('active');

  // Set current track reference
  currentTrack = track;
}

// Slider control for current track
const seekSlider = document.getElementById('seekSlider');

function updateSlider() {
  if (currentAudio && currentAudio.duration) {
    seekSlider.max = currentAudio.duration;
    seekSlider.value = currentAudio.currentTime;
  }
  requestAnimationFrame(updateSlider);
}
requestAnimationFrame(updateSlider);

seekSlider.addEventListener('input', () => {
  if (currentAudio) {
    currentAudio.currentTime = seekSlider.value;
  }
});

// Sync slider with current track
currentAudio && currentAudio.addEventListener('timeupdate', () => {
  seekSlider.value = currentAudio.currentTime;
});

// Initialize drawing
drawWheel();
</script>

</body>
</html>
