<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Music - nattyvancleef</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Helvetica+Neue:wght@300&display=swap');

body {
  margin: 0;
  font-family: 'Helvetica Neue', Arial, sans-serif;
  background: #000;
  color: #fff;
  overflow: hidden;
}

/* NAV — MATCH INDEX */
nav {
  position: fixed;
  top: 20px;
  right: 20px;
  z-index: 10;
}
nav ul {
  display: flex;
  gap: 30px;
  list-style: none;
  margin: 0;
  padding: 0;
}
nav a {
  color: #fff;
  text-decoration: none;
  font-size: 24px;
  font-weight: 300;
  transition: filter 0.3s;
}
nav a:hover { filter: blur(1px); }

/* NVC arrow — MATCH INDEX */
.return-arrow {
  position: fixed;
  top: 20px;
  left: 20px;
  color: #fff;
  text-decoration: none;
  font-size: 14px;
  letter-spacing: 2px;
  z-index: 10;
  opacity: 0.6;
}

/* UI */
.track-ui {
  position: absolute;
  transform: translate(-50%, -50%);
  text-align: center;
  font-size: 12px;
  pointer-events: none;
  width: 140px;
  white-space: nowrap;
}

/* arrows */
.arrow {
  position: fixed;
  bottom: 140px;
  font-size: 22px;
  cursor: pointer;
}
#leftArrow { left: 49%; }
#rightArrow { right: 49%; }

/* overlay */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  opacity: 0;
  pointer-events: none;
}
.overlay.active {
  opacity: 1;
  pointer-events: all;
}
</style>
</head>

<body>

<a href="index.html" class="return-arrow">NVC</a>

<nav>
<ul>
<li><a href="photos.html">Photos</a></li>
<li><a href="videos.html">Videos</a></li>
<li><a href="music.html">Music</a></li>
<li><a href="contact.html">Contact</a></li>
</ul>
</nav>

<div id="leftArrow" class="arrow">←</div>
<div id="rightArrow" class="arrow">→</div>
<div id="overlay" class="overlay"></div>
<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let w = canvas.width = window.innerWidth;
let h = canvas.height = window.innerHeight;

window.addEventListener("resize", () => {
  w = canvas.width = window.innerWidth;
  h = canvas.height = window.innerHeight;
});

/* STARFIELD — ORIGINAL STYLE */
const layers = [
  {count:60,speed:0.2,size:1},
  {count:40,speed:0.5,size:2},
  {count:25,speed:1,size:3}
];

let stars = layers.map(l =>
  Array.from({length:l.count},()=>({
    x:Math.random()*w,
    y:Math.random()*h
  }))
);

/* AUDIO */
let audioCtx = new (window.AudioContext || window.webkitAudioContext)();
let analyser = audioCtx.createAnalyser();
analyser.fftSize = 256;

let currentAudio = null;
let sourceNode = null;

function setupAudio(audio){
  if(sourceNode) sourceNode.disconnect();
  sourceNode = audioCtx.createMediaElementSource(audio);
  sourceNode.connect(analyser);
  analyser.connect(audioCtx.destination);
}

let dataArray = new Uint8Array(analyser.frequencyBinCount);

function getBass(){
  analyser.getByteFrequencyData(dataArray);
  let sum = 0;
  for(let i=0;i<10;i++) sum += dataArray[i];
  return sum / 10 / 255;
}

/* TRACKS */
const pages = [
[
{ name:"Paul and Djon", src:"paul and djon.mp3" },
{ name:"Almostblue", src:"Almostbloue.mp3" },
{ name:"Architecture", src:"Architecture2.mp3" },
{ name:"bailey", src:"bailey3.mp3" },
{ name:"BODYOFME", src:"BODYOFME RM.mp3" },
{ name:"deathproof", src:"deathproof2.mp3" }
],
[
{ name:"...", src:"" },
{ name:"...", src:"" },
{ name:"...", src:"" },
{ name:"...", src:"" },
{ name:"...", src:"" },
{ name:"...", src:"" }
],
[
{ name:"...", src:"" },
{ name:"...", src:"" },
{ name:"...", src:"" },
{ name:"...", src:"" },
{ name:"...", src:"" },
{ name:"...", src:"" }
]
];

let currentPage = 0;
let hovered = null;
let zoomed = null;
let angleOffsets = [];

/* UI */
function buildUI(){
  document.querySelectorAll(".track-ui").forEach(e=>e.remove());

  angleOffsets = pages[currentPage].map(()=>0);

  pages[currentPage].forEach((t,i)=>{
    const ui=document.createElement("div");
    ui.className="track-ui";
    ui.innerHTML = `<div>${t.name}</div>`;
    document.body.appendChild(ui);
    t.ui=ui;
  });
}
buildUI();

/* VINYL */
function drawVinyl(x,y,size,i){
  let bass = getBass();
  let wobble = bass * 6;

  ctx.save();
  ctx.translate(x,y);
  ctx.rotate(angleOffsets[i]);

  ctx.beginPath();
  ctx.arc(0,0,size+wobble,0,Math.PI*2);
  ctx.fillStyle="#111";
  ctx.fill();

  for(let r=5;r<size;r+=4){
    ctx.beginPath();
    ctx.arc(0,0,r,0,Math.PI*2);
    ctx.strokeStyle="rgba(255,255,255,0.05)";
    ctx.stroke();
  }

  ctx.beginPath();
  ctx.arc(0,0,size*0.3,0,Math.PI*2);
  ctx.fillStyle="#ddd";
  ctx.fill();

  ctx.restore();
}

/* DRAW */
function draw(){
  requestAnimationFrame(draw);
  ctx.clearRect(0,0,w,h);

  // stars
  layers.forEach((l,i)=>{
    stars[i].forEach(s=>{
      s.y+=l.speed;
      if(s.y>h) s.y=0;
      ctx.fillStyle="#fff";
      ctx.fillRect(s.x,s.y,l.size,l.size);
    });
  });

  const songs = pages[currentPage];
  const step = Math.PI*2/songs.length;
  const radius = zoomed!==null ? 0 : 180;

  songs.forEach((s,i)=>{
    let angle=i*step;

    let x=w/2 + Math.cos(angle)*radius;
    let y=h/2 + Math.sin(angle)*radius;

    let size = (zoomed===i)?110:(hovered===i?35:25);

    drawVinyl(x,y,size,i);

    s.x=x; s.y=y;

    // FIXED TEXT LOGIC
    if(zoomed!==null){
      if(zoomed===i){
        s.ui.style.display="block";
        s.ui.style.left=w/2+"px";
        s.ui.style.top=(h/2 + 140)+"px";
        s.ui.style.fontSize="14px";
      } else {
        s.ui.style.display="none";
      }
    } else {
      s.ui.style.display="block";
      s.ui.style.left=x+"px";
      s.ui.style.top=(y+70)+"px";
      s.ui.style.fontSize="12px";
    }

    if(currentAudio && zoomed===i){
      angleOffsets[i]+=0.02;
    }
  });
}
draw();

/* HOVER */
canvas.addEventListener("mousemove",e=>{
  hovered=null;

  pages[currentPage].forEach((s,i)=>{
    let size = (zoomed===i)?110:25;
    if(Math.hypot(e.clientX-s.x,e.clientY-s.y)<size){
      hovered=i;
    }
  });
});

/* SCRATCH */
let dragging=false;

canvas.addEventListener("mousedown",()=>{
  if(zoomed!==null) dragging=true;
});
canvas.addEventListener("mouseup",()=> dragging=false);

canvas.addEventListener("mousemove",e=>{
  if(dragging && currentAudio){
    currentAudio.currentTime += e.movementX*0.01;
    angleOffsets[zoomed] += e.movementX*0.01;
  }
});

/* CLICK */
canvas.addEventListener("click",e=>{
  let clicked=false;

  pages[currentPage].forEach((s,i)=>{
    let size=(zoomed===i)?110:30;

    if(Math.hypot(e.clientX-s.x,e.clientY-s.y)<size){

      clicked=true;

      if(zoomed===i){
        stopAudio();
        return;
      }

      zoomed=i;
      overlay.classList.add("active");

      if(currentAudio) stopAudio();

      if(s.src){
        let audio=new Audio(s.src);
        setupAudio(audio);
        audio.play();
        currentAudio=audio;
      }
    }
  });

  if(!clicked && zoomed!==null){
    stopAudio();
  }
});

/* ARROWS */
leftArrow.onclick=()=>{
  currentPage=(currentPage-1+pages.length)%pages.length;
  stopAudio();
  buildUI();
};

rightArrow.onclick=()=>{
  currentPage=(currentPage+1)%pages.length;
  stopAudio();
  buildUI();
};

/* STOP */
function stopAudio(){
  if(currentAudio){
    currentAudio.pause();
    currentAudio=null;
  }
  zoomed=null;
  overlay.classList.remove("active");
}

overlay.addEventListener("click",stopAudio);
</script>

</body>
</html>
