<!DOCTYPE html>
<html>
<head>
  <title>Music - nattyvancleef</title>
  <meta charset="UTF-8" />

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Helvetica+Neue:wght@300&display=swap');

    body {
      margin: 0;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      background: #000;
      color: #fff;
      overflow-x: hidden;
    }

    /* NAV */
    nav {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 10;
    }

    nav ul {
      display: flex;
      gap: 30px;
      list-style: none;
      margin: 0;
      padding: 0;
    }

    nav a {
      color: #fff;
      text-decoration: none;
      font-size: 24px;
      font-weight: 300;
      transition: filter 0.3s;
    }

    nav a:hover {
      filter: blur(1px);
    }

    /* NVC */
    .return-arrow {
      position: fixed;
      top: 20px;
      left: 20px;
      color: #fff;
      text-decoration: none;
      font-size: 14px;
      letter-spacing: 2px;
      z-index: 10;
    }

    /* BACKGROUND */
    canvas#stars {
      position: fixed;
      inset: 0;
      z-index: -2;
    }

    .nebula {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 30% 40%, rgba(120,120,150,0.07), transparent 60%),
        radial-gradient(circle at 70% 60%, rgba(100,100,130,0.05), transparent 70%);
      z-index: -1;
    }

    section {
      padding: 100px 20px;
      max-width: 700px;
      margin: auto;
      text-align: center;
    }

    h2 {
      font-size: 24px;
      font-weight: 300;
      letter-spacing: 4px;
    }

    p {
      color: rgba(255,255,255,0.5);
      margin-bottom: 40px;
      font-size: 14px;
    }

    .track {
      margin-bottom: 70px;
      cursor: pointer;
    }

    .track-title {
      font-size: 18px;
      font-weight: 300;
      margin-bottom: 6px;
    }

    .track.active .track-title {
      opacity: 0.6;
    }

    .time {
      font-size: 13px;
      opacity: 0.5;
      margin-bottom: 10px;
    }

    canvas.visualiser {
      width: 100%;
      height: 60px;
    }

    @media (max-width:600px){
      nav a { font-size:18px; }
      .track-title { font-size:16px; }
    }

  </style>
</head>

<body>

<div class="nebula"></div>
<canvas id="stars"></canvas>

<a href="index.html" class="return-arrow">NVC</a>

<nav>
  <ul>
    <li><a href="photos.html">Photos</a></li>
    <li><a href="videos.html">Videos</a></li>
    <li><a href="music.html">Music</a></li>
    <li><a href="contact.html">Contact</a></li>
  </ul>
</nav>

<section>
  <h2>MUSIC</h2>
  <p>Unfinished ideas, sketches, and beats.</p>

  <div class="track" data-audio="audio1">
    <div class="track-title">Paul and Djon</div>
    <div class="time">0:00</div>
    <audio id="audio1" src="paul and djon.mp3"></audio>
    <canvas class="visualiser"></canvas>
  </div>

</section>

<script>
let currentAudio = null;
let locked = false;

document.querySelectorAll('.track').forEach(track => {
  const audio = document.getElementById(track.dataset.audio);
  const timeDisplay = track.querySelector('.time');
  const canvas = track.querySelector('.visualiser');
  const ctx = canvas.getContext('2d');

  function resize() {
    canvas.width = canvas.clientWidth;
    canvas.height = canvas.clientHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const source = audioCtx.createMediaElementSource(audio);
  const analyser = audioCtx.createAnalyser();

  source.connect(analyser);
  analyser.connect(audioCtx.destination);
  analyser.fftSize = 128;

  const dataArray = new Uint8Array(analyser.frequencyBinCount);

  function draw() {
    requestAnimationFrame(draw);
    analyser.getByteTimeDomainData(dataArray);

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.beginPath();
    ctx.lineWidth = 1.5;
    ctx.strokeStyle = "#d0d6ff";

    const mid = canvas.height / 2;
    const sliceWidth = canvas.width / dataArray.length;

    let x = 0;

    for (let i = 0; i < dataArray.length; i++) {
      let v = (dataArray[i] - 128) / 128;

      // soften movement
      let y = mid + v * (canvas.height * 0.2);

      // lock edges
      if (i === 0 || i === dataArray.length - 1) {
        y = mid;
      }

      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);

      x += sliceWidth;
    }

    ctx.stroke();
  }

  audio.onplay = () => {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    draw();
  };

  track.addEventListener('click', () => {
    if (currentAudio && currentAudio !== audio) {
      currentAudio.pause();
      currentAudio.currentTime = 0;
      document.querySelectorAll('.track').forEach(t => t.classList.remove('active'));
    }

    if (audio.paused) {
      audio.play();
      currentAudio = audio;
      locked = true;
      track.classList.add('active');
    } else {
      audio.pause();
      locked = false;
      track.classList.remove('active');
    }
  });

  track.addEventListener('mouseenter', () => {
    if (!locked) {
      audio.currentTime = 0;
      audio.play();
    }
  });

  track.addEventListener('mouseleave', () => {
    if (!locked) {
      audio.pause();
      audio.currentTime = 0;
    }
  });

  // countdown timer
  audio.addEventListener('timeupdate', () => {
    if (!audio.duration) return;
    let remaining = audio.duration - audio.currentTime;
    let mins = Math.floor(remaining / 60);
    let secs = Math.floor(remaining % 60).toString().padStart(2,'0');
    timeDisplay.textContent = `${mins}:${secs}`;
  });

  audio.addEventListener('ended', () => {
    timeDisplay.textContent = "0:00";
    track.classList.remove('active');
    locked = false;
  });
});


/* STARS */
const starCanvas = document.getElementById('stars');
const starCtx = starCanvas.getContext('2d');

function resizeStars(){
  starCanvas.width = window.innerWidth;
  starCanvas.height = window.innerHeight;
}
resizeStars();
window.addEventListener('resize', resizeStars);

let stars = Array.from({length: 180}, () => ({
  x: Math.random() * starCanvas.width,
  y: Math.random() * starCanvas.height,
  r: Math.random() * 2.5,
  o: Math.random()
}));

function drawStars(){
  starCtx.clearRect(0,0,starCanvas.width,starCanvas.height);

  stars.forEach(s=>{
    starCtx.fillStyle = `rgba(255,255,255,${s.o})`;
    starCtx.fillRect(s.x, s.y, s.r, s.r);
  });

  requestAnimationFrame(drawStars);
}
drawStars();

</script>

</body>
</html>
