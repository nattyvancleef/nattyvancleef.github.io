<!DOCTYPE html>
<html>
<head>
  <title>Music - nattyvancleef</title>
  <meta charset="UTF-8" />

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@300;400&family=Cormorant+Garamond:wght@300&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Cormorant Garamond', serif;
      background: #000;
      color: #fff;
      overflow-x: hidden;
    }

    /* Organic starfield */
    canvas#stars {
      position: fixed;
      inset: 0;
      z-index: -1;
    }

    .return-arrow {
      position: fixed;
      top: 20px;
      left: 20px;
      color: #fff;
      text-decoration: none;
      padding: 10px;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(4px);
      z-index: 10;
    }

    .return-arrow::after {
      content: "NVC";
      font-family: 'Orbitron', sans-serif;
      font-size: 12px;
      letter-spacing: 2px;
    }

    section {
      padding: 80px 20px;
      max-width: 700px;
      margin: auto;
      text-align: center;
    }

    h2 {
      font-family: 'Orbitron', sans-serif;
      letter-spacing: 3px;
    }

    p {
      color: rgba(255,255,255,0.5);
      margin-bottom: 40px;
    }

    .track {
      margin-bottom: 50px;
      cursor: pointer;
    }

    .track-title {
      font-size: 18px;
      color: #b8c6ff;
      margin-bottom: 10px;
      transition: 0.3s;
    }

    .track.active .track-title {
      text-shadow: 0 0 12px rgba(150,180,255,0.6);
    }

    .progress {
      width: 100%;
      height: 2px;
      background: rgba(255,255,255,0.2);
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: #b8c6ff;
    }

    canvas.visualiser {
      width: 100%;
      height: 60px;
      margin-top: 10px;
    }

    @media (max-width: 600px) {
      .track-title {
        font-size: 16px;
      }
    }
  </style>
</head>

<body>

<canvas id="stars"></canvas>

<a href="index.html" class="return-arrow"></a>

<section>
  <h2>MUSIC</h2>
  <p>Unfinished ideas, sketches, and beats.</p>

  <div class="track" data-audio="audio1">
    <div class="track-title">Paul and Djon</div>
    <audio id="audio1" src="paul and djon.mp3"></audio>

    <div class="progress"><div class="progress-bar"></div></div>
    <canvas class="visualiser"></canvas>
  </div>

</section>

<script>
let currentAudio = null;
let locked = false;

document.querySelectorAll('.track').forEach(track => {
  const audio = document.getElementById(track.dataset.audio);
  const progressBar = track.querySelector('.progress-bar');
  const canvas = track.querySelector('.visualiser');
  const ctx = canvas.getContext('2d');

  // Resize canvas
  function resize() {
    canvas.width = canvas.clientWidth;
    canvas.height = canvas.clientHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  // AUDIO CONTEXT
  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const source = audioCtx.createMediaElementSource(audio);
  const analyser = audioCtx.createAnalyser();

  source.connect(analyser);
  analyser.connect(audioCtx.destination);
  analyser.fftSize = 128;

  const dataArray = new Uint8Array(analyser.frequencyBinCount);

  function draw() {
    requestAnimationFrame(draw);
    analyser.getByteFrequencyData(dataArray);

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    let barWidth = canvas.width / dataArray.length;

    for (let i = 0; i < dataArray.length; i++) {
      let value = dataArray[i];
      let height = (value / 255) * canvas.height;

      ctx.fillStyle = "rgba(180,200,255,0.8)";
      ctx.fillRect(i * barWidth, canvas.height - height, barWidth - 1, height);
    }
  }

  audio.onplay = () => {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    draw();
  };

  // CLICK = lock play
  track.addEventListener('click', () => {
    if (currentAudio && currentAudio !== audio) {
      currentAudio.pause();
      currentAudio.currentTime = 0;
      document.querySelectorAll('.track').forEach(t => t.classList.remove('active'));
    }

    if (audio.paused) {
      audio.play();
      currentAudio = audio;
      locked = true;
      track.classList.add('active');
    } else {
      audio.pause();
      locked = false;
      track.classList.remove('active');
    }
  });

  // HOVER PREVIEW (only if not locked)
  track.addEventListener('mouseenter', () => {
    if (!locked) {
      audio.currentTime = 0;
      audio.play();
    }
  });

  track.addEventListener('mouseleave', () => {
    if (!locked) {
      audio.pause();
      audio.currentTime = 0;
    }
  });

  // Progress bar
  audio.addEventListener('timeupdate', () => {
    const progress = (audio.currentTime / audio.duration) * 100;
    progressBar.style.width = progress + "%";
  });

  audio.addEventListener('ended', () => {
    progressBar.style.width = "0%";
    track.classList.remove('active');
    locked = false;
  });
});


// 🌌 ORGANIC STARFIELD
const starCanvas = document.getElementById('stars');
const starCtx = starCanvas.getContext('2d');

function resizeStars() {
  starCanvas.width = window.innerWidth;
  starCanvas.height = window.innerHeight;
}
resizeStars();
window.addEventListener('resize', resizeStars);

let stars = Array.from({length: 120}, () => ({
  x: Math.random() * starCanvas.width,
  y: Math.random() * starCanvas.height,
  r: Math.random() * 1.5,
  o: Math.random()
}));

function drawStars() {
  starCtx.clearRect(0,0,starCanvas.width,starCanvas.height);

  stars.forEach(s => {
    starCtx.beginPath();
    starCtx.arc(s.x, s.y, s.r, 0, Math.PI*2);
    starCtx.fillStyle = `rgba(255,255,255,${s.o})`;
    starCtx.fill();
  });

  requestAnimationFrame(drawStars);
}
drawStars();

</script>

</body>
</html>
